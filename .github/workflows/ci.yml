name: Build and Test

on:
  push:
    branches: [ "master", "dev", "feat/*" ]
  pull_request:
    branches: [ "master", "dev", "feat/*" ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Restore artifacts, or setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgDirectory: ${{ github.workspace }}/vcpkg
        vcpkgJsonGlob: 'vcpkg.json'
        vcpkgConfigurationJsonGlob: 'vcpkg-configuration.json'

    - name: Configure CMake
      run: cmake -S . -B build -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static

    - name: Build
      run: cmake --build build --config Release

    - name: Test
      run: ctest --test-dir build -C Release --output-on-failure

  build-linux-x64:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
      LANG: zh_CN.UTF-8
      LANGUAGE: zh_CN:zh
      LC_ALL: zh_CN.UTF-8
    steps:
    - name: Install System Dependencies
      run: |
        apt-get update
        apt-get install -y software-properties-common gnupg ca-certificates locales wget
        for i in 1 2 3 4 5; do add-apt-repository ppa:ubuntu-toolchain-r/test -y && break || sleep 2; done
        for i in 1 2 3 4 5; do add-apt-repository ppa:deadsnakes/ppa -y && break || sleep 2; done
        apt-get update
        apt-get upgrade -y
        apt-get install -y \
          git gcc-13 g++-13 binutils ninja-build \
          make curl zip unzip tar pkg-config perl \
          autoconf automake libtool gperf \
          python3.9 python3.9-dev python3.9-venv python3.9-distutils python3-pip \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libxext-dev libxfixes-dev libxkbcommon-dev libwayland-dev \
          libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
          mesa-vulkan-drivers libvulkan-dev \
          libasound2-dev libpulse-dev libdbus-1-dev libudev-dev \
          libmount-dev libcap-dev libglu1-mesa-dev xorg-dev \
          libsystemd-dev libcryptsetup-dev libgcrypt20-dev liblzma-dev liblz4-dev libzstd-dev \
          libacl1-dev libkmod-dev libblkid-dev libseccomp-dev libpam0g-dev
        update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100 --slave /usr/bin/g++ g++ /usr/bin/g++-13
        update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.9 100
        python3 -m pip install jinja2
        locale-gen zh_CN.UTF-8
        gcc --version
        ld --version
        python3 --version
        pkg-config --version

    - name: Install CMake 3.30
      run: |
        wget -q https://github.com/Kitware/CMake/releases/download/v3.30.0/cmake-3.30.0-linux-x86_64.tar.gz
        tar xzf cmake-3.30.0-linux-x86_64.tar.gz -C /opt
        ln -sf /opt/cmake-3.30.0-linux-x86_64/bin/cmake /usr/local/bin/cmake
        ln -sf /opt/cmake-3.30.0-linux-x86_64/bin/ctest /usr/local/bin/ctest
        cmake --version

    - uses: actions/checkout@v4

    - name: Setup VCPKG
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
        echo "VCPKG_ROOT=$PWD/vcpkg" >> $GITHUB_ENV

    - name: Configure CMake
      run: cmake -S . -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-linux-static

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    container:
      image: ubuntu:20.04
    env:
      DEBIAN_FRONTEND: noninteractive
      LANG: zh_CN.UTF-8
      LANGUAGE: zh_CN:zh
      LC_ALL: zh_CN.UTF-8
    steps:
    - name: Install System Dependencies
      run: |
        apt-get update
        apt-get install -y software-properties-common gnupg ca-certificates locales wget
        for i in 1 2 3 4 5; do add-apt-repository ppa:ubuntu-toolchain-r/test -y && break || sleep 2; done
        for i in 1 2 3 4 5; do add-apt-repository ppa:deadsnakes/ppa -y && break || sleep 2; done
        apt-get update
        apt-get upgrade -y
        apt-get install -y \
          git gcc-13 g++-13 binutils ninja-build \
          make curl zip unzip tar pkg-config perl \
          autoconf automake libtool gperf \
          python3.9 python3.9-dev python3.9-venv python3.9-distutils python3-pip \
          libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
          libxext-dev libxfixes-dev libxkbcommon-dev libwayland-dev \
          libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
          mesa-vulkan-drivers libvulkan-dev \
          libasound2-dev libpulse-dev libdbus-1-dev libudev-dev \
          libmount-dev libcap-dev libglu1-mesa-dev xorg-dev \
          libsystemd-dev libcryptsetup-dev libgcrypt20-dev liblzma-dev liblz4-dev libzstd-dev \
          libacl1-dev libkmod-dev libblkid-dev libseccomp-dev libpam0g-dev
        update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100 --slave /usr/bin/g++ g++ /usr/bin/g++-13
        update-alternatives --install /usr/bin/python3 python3 /usr/bin/python3.9 100
        python3 -m pip install jinja2
        locale-gen zh_CN.UTF-8
        gcc --version
        ld --version
        python3 --version
        pkg-config --version

    - name: Install CMake 3.30
      run: |
        wget -q https://github.com/Kitware/CMake/releases/download/v3.30.0/cmake-3.30.0-linux-aarch64.tar.gz
        tar xzf cmake-3.30.0-linux-aarch64.tar.gz -C /opt
        ln -sf /opt/cmake-3.30.0-linux-aarch64/bin/cmake /usr/local/bin/cmake
        ln -sf /opt/cmake-3.30.0-linux-aarch64/bin/ctest /usr/local/bin/ctest
        cmake --version

    - uses: actions/checkout@v4

    - name: Setup VCPKG
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.sh -disableMetrics
        echo "VCPKG_ROOT=$PWD/vcpkg" >> $GITHUB_ENV

    - name: Configure CMake
      run: cmake -S . -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=arm64-linux-static

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure
