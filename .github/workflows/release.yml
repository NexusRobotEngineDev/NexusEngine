    - name: Configure CMake
      run: cmake -S . -B build -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$PWD/vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=arm64-linux-static

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Package
      run: |
        PKG_NAME="NexusEngine-v${{ env.VERSION }}-linux-arm64"
        PKG_DIR="build/${PKG_NAME}"
        mkdir -p "${PKG_DIR}/lib"

        cp build/NexusApp "${PKG_DIR}/"
        chmod +x "${PKG_DIR}/NexusApp"

        VCPKG_LIB="build/vcpkg_installed/arm64-linux-static/lib"
        [ -f "${VCPKG_LIB}/libvulkan.so.1" ] && cp "${VCPKG_LIB}/libvulkan.so.1" "${PKG_DIR}/lib/" || true
        if [ -f "${VCPKG_LIB}/libmujoco.so.3.2.7" ]; then
          cp -L "${VCPKG_LIB}/libmujoco.so.3.2.7" "${PKG_DIR}/lib/"
          ln -sf libmujoco.so.3.2.7 "${PKG_DIR}/lib/libmujoco.so"
        fi

        GCC13_LIB=$(gcc-13 -print-file-name=libstdc++.so.6 2>/dev/null || echo "")
        [ -n "$GCC13_LIB" ] && [ -f "$GCC13_LIB" ] && cp -L "$GCC13_LIB" "${PKG_DIR}/lib/" || true

        [ -d "build/Data" ] && cp -r build/Data "${PKG_DIR}/Data"

        cat > "${PKG_DIR}/run.sh" << 'EOF'
        #!/bin/bash
        SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
        export LD_LIBRARY_PATH="${SCRIPT_DIR}/lib:${LD_LIBRARY_PATH}"
        exec "${SCRIPT_DIR}/NexusApp" "$@"
        EOF
        chmod +x "${PKG_DIR}/run.sh"

        cd build && tar -czvf "${PKG_NAME}.tar.gz" "${PKG_NAME}/"
        echo "ARTIFACT_PATH=build/${PKG_NAME}.tar.gz" >> $GITHUB_ENV
        echo "ARTIFACT_NAME=${PKG_NAME}" >> $GITHUB_ENV

    - name: Upload Linux Package
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.ARTIFACT_PATH }}
